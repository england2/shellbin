global:
  databaseName: shellbin
  DBUSER: weak
  DBPASS: drainage
  imagePullSecret: reg-cred-secret

webserver:
  replicaCount: 1
  name: webserver
  image:
    repository: ghcr.io/england2/shellbin
    pullPolicy: IfNotPresent
    tag: webserver-latest
    digest: ""

  service:
    type: ClusterIP
    port: 4747

dbservice:
  replicaCount: 1
  name: db-service
  image:
    repository: ghcr.io/england2/shellbin
    pullPolicy: IfNotPresent
    tag: dbservice-latest
    digest: ""

  resources: {}
  service:
    type: ClusterIP
    port: 7272

  serviceAccount:
    # Specifies whether a service account should be created
    create: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

ncserver:
  replicaCount: 1
  name: ncserver
  image:
    repository: ghcr.io/england2/shellbin
    pullPolicy: IfNotPresent
    tag: ncserver-latest
    digest: ""

  resources: {}
  service:
    type: ClusterIP
    port: 7

  serviceAccount:
    # Specifies whether a service account should be created
    create: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

database:
  enabled: true
  name: shellbin-mysql
  host: ""
  image:
    repository: mysql
    pullPolicy: IfNotPresent
    tag: "8.4.8"
    digest: ""
  auth:
    rootPassword: root
  persistence:
    size: 5Gi

developmentTesting:
  # if enabled will create nodeports into each microservice
  enabled: true
  nodePorts:
    database: 31330
    dbservice: 31331
    ncserver: 31332
    webserver: 31333

imagePullSecrets: [regcred]
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
