{{- if .Values.database.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.database.name }}
spec:
  serviceName: {{ .Values.database.name }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.database.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.database.name }}
    spec:
      containers:
        - name: mysql
          image: "{{ include "shellbin.image" .Values.database.image }}"
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          args:
            - --default-authentication-plugin=mysql_native_password
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.name }}
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.name }}
                  key: mysql-database
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.name }}
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.name }}
                  key: mysql-password
          ports:
            - name: mysql
              containerPort: 3306
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
{{- if not .Values.database.persistence.enabled }}
        - name: mysql-data
          emptyDir: {}
{{- end }}
        - name: initdb
          configMap:
            name: {{ .Values.database.name }}-initdb
{{- if .Values.database.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
{{- with .Values.database.persistence.annotations }}
        annotations:
{{ toYaml . | indent 10 }}
{{- end }}
      spec:
        accessModes:
{{ toYaml .Values.database.persistence.accessModes | indent 10 }}
{{- if .Values.database.persistence.storageClassName }}
        storageClassName: {{ .Values.database.persistence.storageClassName | quote }}
{{- end }}
        resources:
          requests:
            storage: {{ .Values.database.persistence.size }}
{{- end }}
{{- end }}
