apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.ncserver.name }}
  labels:
    app: {{ .Values.ncserver.name }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.ncserver.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.ncserver.name }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ .Values.ncserver.name }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      serviceAccountName: {{ include "shellbin.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Values.ncserver.name}}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ include "shellbin.image" .Values.ncserver.image }}"
          imagePullPolicy: {{ .Values.ncserver.image.pullPolicy }}
          # command: ["sleep"]
          # args: ["infinity"]
          command: ["sh"]
          args: ["entrypoint.sh"]
          env:
            - name: DBSERVICEADDR
              value: {{ .Values.global.DBSERVICEADDR }}
          ports:
            - name: internal-port
              containerPort: {{ .Values.ncserver.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.ncserver.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.ncserver.name }}
  labels:
    {{- include "shellbin.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ncserver.service.type }}
  ports:
    - port: {{ .Values.ncserver.service.port }}
      targetPort: 6262
      protocol: TCP
      name: ncserver-port
  selector:
    app: {{ .Values.ncserver.name }}
