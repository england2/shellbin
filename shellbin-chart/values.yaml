global:
  databaseName: mysql
  DBUSER: weak
  DBPASS: drainage
  # HARDCODED
  DBADDR: shellbin-mysql.shellbin.svc.cluster.local
  # HARDCODED:
  DBSERVICEADDR: db-service.shellbin.svc.cluster.local
  registryUrl: "localhost:5000"
  imagePullSecret: regcred

rustwebserver:
  replicaCount: 1
  name: rustwebserver
  image:
    repository: rustwebserver
    pullPolicy: Always
    tag: ""

  service:
    type: ClusterIP
    port: 4747
      
    
dbservice:
  replicaCount: 1
  name: db-service
  image:
    # TODO use template within template to get repo name
    # TODO where is there an A at the end of this?
    repository: db-servicea
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

  resources: {}
  service:
    type: ClusterIP
    port: 7272

  serviceAccount:
    # Specifies whether a service account should be created
    create: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

ncserver:
  replicaCount: 1
  name: ncserver
  image:
    repository: ncservera
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

  resources: {}
  service:
    type: ClusterIP
    port: 7

  serviceAccount:
    # Specifies whether a service account should be created
    create: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

imagePullSecrets: [regcred]
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
