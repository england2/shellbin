apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.ncServer.name }}
  labels:
    {{- include "shellbin.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.ncServer.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.ncServer.name }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: {{ .Values.ncServer.name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "shellbin.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Values.ncServer.name}}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.ncServer.image.repository }}:{{ .Values.ncServer.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.ncServer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ncServer.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.ncServer.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.ncServer.name }}
  labels:
    {{- include "shellbin.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ncServer.service.type }}
  ports:
    - port: {{ .Values.ncServer.service.port }}
      targetPort: 6262
      protocol: TCP
      name: ncserver-port
  selector:
    app.kubernetes.io/name: {{ .Values.ncServer.name }}