name: "Build/push images to GHCR"

permissions:
  contents: read
  packages: write

on:
  # blank `workflow_dispatch:` allows for ad-hoc workflow runs via the github web ui
  workflow_dispatch:
  push:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
    strategy:
      matrix:
        include:
          - container_dir: nc-server
            image_tag: ncserver
            src_dir: nc-server/src

          - container_dir: webserver
            image_tag: webserver
            src_dir: webserver/src

          - container_dir: db-service
            image_tag: dbservice
            src_dir: db-service/src

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.src_dir }}/go.mod
          cache-dependency-path: ${{ matrix.src_dir }}/go.sum

      - name: Run Go tests
        working-directory: ${{ matrix.src_dir }}
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.container_dir }}
          file: ${{ matrix.container_dir }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ matrix.image_tag }}
            ${{ env.IMAGE_REPO }}:${{ matrix.image_tag }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_tag }}

  update-cluster-repo:
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only update deployment state for manual runs or pushes to master.
    # Branch builds still publish images, but they do not mutate cluster-repo.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    env:
      CLUSTER_REPO: england2/cluster-repo
      CLUSTER_REPO_BRANCH: main
      VALUES_FILE: argocd-reconciled-yaml/applications/shellbin/values-prod.yaml
    steps:
      - name: Checkout cluster-repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.CLUSTER_REPO }}
          ref: ${{ env.CLUSTER_REPO_BRANCH }}
          token: ${{ secrets.GHCR_PAT }}
          path: cluster-repo

      - name: Update image tags
        uses: mikefarah/yq@v4.44.3
        env:
          IMAGE_SHA: ${{ github.sha }}
        with:
          cmd: >-
            yq -i
            '.webserver.image.tag = "webserver-" + strenv(IMAGE_SHA) |
            .dbservice.image.tag = "dbservice-" + strenv(IMAGE_SHA) |
            .ncserver.image.tag = "ncserver-" + strenv(IMAGE_SHA)'
            'cluster-repo/${{ env.VALUES_FILE }}'

      - name: Commit and push
        working-directory: cluster-repo
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$VALUES_FILE"
          git diff --cached --quiet && exit 0
          git commit -m "deploy shellbin ${GITHUB_SHA}"
          git push origin "$CLUSTER_REPO_BRANCH"
